services:
  php:
    build:
      context: ./backend
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: portfolio-php
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/var/www/html
    networks:
      - portfolio
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  node:
    build:
      context: ./frontend
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: portfolio-node
    restart: unless-stopped
    volumes:
      - ./frontend:/app
    networks:
      - portfolio
    depends_on:
      - php

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - portfolio
    depends_on:
      - php
      - node

  mariadb:
    image: mariadb:11
    container_name: portfolio-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-portfolio}
      MARIADB_USER: ${DB_USERNAME:-portfolio}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - portfolio
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - portfolio
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
  redis_data:

networks:
  portfolio:
    driver: bridge
