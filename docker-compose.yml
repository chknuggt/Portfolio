services:
  api:
    build:
      context: ./backend
    container_name: portfolio-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${DB_USERNAME:-portfolio}:${DB_PASSWORD:-secret}@postgres:5432/${DB_DATABASE:-portfolio}?sslmode=disable
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    networks:
      - portfolio
    depends_on:
      postgres:
        condition: service_healthy

  node:
    build:
      context: ./frontend
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: portfolio-node
    restart: unless-stopped
    volumes:
      - ./frontend:/app
    networks:
      - portfolio
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - portfolio
    depends_on:
      - api
      - node

  postgres:
    image: postgres:17-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-portfolio}
      POSTGRES_USER: ${DB_USERNAME:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-portfolio} -d ${DB_DATABASE:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

networks:
  portfolio:
    driver: bridge
