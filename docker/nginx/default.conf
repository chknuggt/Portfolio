server {
    listen 80;
    server_name marioselef.com www.marioselef.com localhost;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name marioselef.com www.marioselef.com;

    ssl_certificate /etc/letsencrypt/live/marioselef.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marioselef.com/privkey.pem;

    charset utf-8;
    client_max_body_size 10M;

    # API routes → Go backend
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block dotfiles
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Everything else → React dev server
    location / {
        proxy_pass http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
